<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | AURA</title>

<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="chat-room">

    <header class="chat-header">

        <a href="chat.html" class="back-btn">←</a>

        <div>

            <h2>Amal</h2>

            <p>🟢 Online</p>

        </div>

    </header>

    <div class="messages">

        <div class="message left">
            Hey 👋
        </div>

        <div class="message right">
            Hi bro!
        </div>

        <div class="message left">
            Where are you?
        </div>

        <div class="message right">
            I'm on my way.
        </div>

    </div>

    <div class="message-box">

        <button>😊</button>

        <input
            type="text"
            placeholder="Type a message..."
        >

        <button>📎</button>

        <button>🎤</button>

        <button>➤</button>

    </div>

</div>

<script src="../js/script.js"></script>

</body>
</html>
